spring:
  datasource:
    url: jdbc:p6spy:postgresql://localhost:5432/deepfine
    username: deepfine
    password: deepfine
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379
