services:
  postgres:
    image: postgres:16-alpine
    container_name: deepfine-postgres
    environment:
      POSTGRES_DB: deepfine
      POSTGRES_USER: deepfine
      POSTGRES_PASSWORD: deepfine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepfine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deepfine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  postgres-data:
  redis-data:
